services:
  - type: web
    name: noise-remover-frontend
    runtime: static
    repo: https://github.com/noiseremovercom/noise-reduction-website.git
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://noise-remover-backend.onrender.com/api
      - key: REACT_APP_MAX_FILE_SIZE
        value: 10485760