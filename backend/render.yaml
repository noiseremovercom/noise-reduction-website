services:
  - type: web
    name: noise-remover-backend
    runtime: node                # ← CHANGE THIS from 'python' to 'node'
    repo: https://github.com/noiseremovercom/noise-reduction-website.git
    branch: main
    rootDir: backend
    buildCommand: npm install     # ← UPDATE this too
    startCommand: node server.js  # ← UPDATE this too
    plan: free
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_FILE_SIZE
        value: 10485760