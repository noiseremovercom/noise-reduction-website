services:
  - type: web
    name: noise-remover-backend
    runtime: python
    repo: https://github.com/noiseremovercom/noise-reduction-website.git
    branch: main
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
    startCommand: python server.py
    plan: free
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: ALLOWED_ORIGINS
        value: https://noise-remover-frontend.onrender.com